        { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='80' fill='%23FDFAF6'/%3E%3Ctext x='256' y='360' font-size='300' text-anchor='middle'%3E%F0%9F%9A%86%3C/text%3E%3C/svg%3E", sizes: "512x512", type: "image/svg+xml" }

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const HUXLEY = "https://huxley2.azurewebsites.net";
const VIA_STATIONS = ["Ockendon", "Chafford Hundred", "Grays"];

const STOP_OFFSETS = {
  "Limehouse":6,"Stepney Green":4,"West Ham":12,"Barking":18,
  "Upminster":28,"Ockendon":38,"Chafford Hundred":43,"Grays":50,
  "Tilbury Town":56,"East Tilbury":62,"Stanford-le-Hope":68,
  "Benfleet":78,"Leigh-on-Sea":84,"Chalkwell":87,
  "Westcliff-on-Sea":90,"Southend Central":94,"Southend East":98,"Thorpe Bay":102,
};
const STOP_OFFSETS_LST = {
  "Stratford":8,"Ilford":14,"Seven Kings":17,"Goodmayes":19,
  "Chadwell Heath":21,"Romford":25,"Gidea Park":29,"Harold Wood":33,
  "Brentwood":39,"Shenfield":44,"Billericay":54,"Wickford":62,
  "Rayleigh":69,"Hockley":74,"Rochford":79,"Southend Victoria":85,
  "Prittlewell":88,"Thorpe Bay":95,
};
const STATIONS = {
  FST: { label:"Fenchurch St", full:"Fenchurch Street" },
  LST: { label:"Liverpool St",  full:"Liverpool Street" },
};

function fmtTime(v) {
  if (!v) return "--:--";
  if (typeof v === "string") {
    const d = new Date(v);
    if (isNaN(d)) return (v.slice(11,16) || v.slice(0,5) || "--:--");
    return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
  }
  return `${String(v.getHours()).padStart(2,"0")}:${String(v.getMinutes()).padStart(2,"0")}`;
}
function addMins(base, m) { return new Date(new Date(base).getTime() + m*60000); }
function timeStrToMins(t) {
  if (!t || t==="--:--") return null;
  const [h,m] = t.split(":").map(Number); return h*60+m;
}
function fmtDuration(mins) {
  if (!mins || mins<=0) return null;
  const h=Math.floor(mins/60), m=mins%60;
  return h>0 ? `${h}h ${m}m` : `${m} min`;
}

function parseDarwin(data, crs) {
  const offsets = crs==="LST" ? STOP_OFFSETS_LST : STOP_OFFSETS;
  const allServices = data.trainServices || [];

  // Keep only c2c services that call at Thorpe Bay somewhere down the line
  const services = allServices.filter(svc => {
    const op = (svc.operator || svc.operatorCode || "").trim().toLowerCase();
    const isC2c = op === "c2c" || op.includes("c2c");
    if (!isC2c) return false;
    const cpArr = svc.subsequentCallingPoints?.[0]?.callingPoint || [];
    const callsAtThorpeBay = cpArr.some(cp => (cp.locationName||"").toLowerCase().includes("thorpe bay"))
      || (svc.destination?.[0]?.locationName||"").toLowerCase().includes("thorpe bay");
    return callsAtThorpeBay;
  });
  return services.map((svc,i) => {
    const depTime = svc.std||"";
    const etdRaw = (svc.etd||"On time").trim();
    const platform = svc.platform||"?";
    const timeDisplay = depTime.slice(0,5)||"--:--";
    const now = new Date();
    const [h,m] = timeDisplay.split(":").map(Number);
    const depDate = new Date(now.getFullYear(),now.getMonth(),now.getDate(),h,m,0);
    if (depDate < now-2*3600000) depDate.setDate(depDate.getDate()+1);

    let status;
    if (etdRaw==="On time"||etdRaw==="No report") {
      status={type:"ontime",label:"On time",delayMins:0};
    } else if (etdRaw==="Cancelled") {
      status={type:"cancelled",label:"Cancelled",delayMins:0};
    } else if (etdRaw==="Delayed") {
      status={type:"delayed",label:"Delayed",delayMins:null};
    } else {
      const schedMins = timeStrToMins(timeDisplay);
      const expMins = timeStrToMins(etdRaw);
      const d = (schedMins!=null&&expMins!=null) ? ((expMins-schedMins+1440)%1440) : null;
      status={type:"delayed",label:`Exp ${etdRaw}`,delayMins:d};
    }

    const cpArr = svc.subsequentCallingPoints?.[0]?.callingPoint||[];
    const stops = cpArr.map(cp => {
      const name = cp.locationName||cp.crs||"";
      let t2 = cp.st ? cp.st.slice(0,5) : null;
      if (!t2) { const off=offsets[name]; t2=off?fmtTime(addMins(depDate,off)):"--:--"; }
      return {name, time:t2};
    });

    const stopNames = stops.map(s=>s.name);
    const isVia = VIA_STATIONS.some(v=>stopNames.includes(v));

    const tbay = stops.find(s=>s.name==="Thorpe Bay");
    let durationMins = crs==="LST"?95:102;
    if (tbay && tbay.time!=="--:--") {
      const [th,tm]=tbay.time.split(":").map(Number);
      const arr=new Date(depDate); arr.setHours(th,tm,0);
      if(arr<depDate) arr.setDate(arr.getDate()+1);
      durationMins=Math.round((arr-depDate)/60000);
    }
    return {id:`${crs}-${i}`,timeDisplay,depDate,durationMins,destination:"Thorpe Bay",platform,status,isVia,calling:stops,fromStation:crs};
  });
}

// Fallback demo data
const FST_ROUTES=[
  {via:true, stops:["Limehouse","West Ham","Barking","Upminster","Ockendon","Chafford Hundred","Grays","Stanford-le-Hope","Benfleet","Leigh-on-Sea","Southend Central","Southend East","Thorpe Bay"]},
  {via:false,stops:["Limehouse","West Ham","Barking","Upminster","Benfleet","Leigh-on-Sea","Southend Central","Southend East","Thorpe Bay"]},
];
const LST_ROUTES=[
  {via:false,stops:["Stratford","Ilford","Romford","Brentwood","Shenfield","Billericay","Wickford","Rayleigh","Rochford","Southend Victoria","Thorpe Bay"]},
];

function generateFallback(crs) {
  const routes=crs==="LST"?LST_ROUTES:FST_ROUTES;
  const offsets=crs==="LST"?STOP_OFFSETS_LST:STOP_OFFSETS;
  // Liverpool St rarely has c2c service — usually empty, occasionally a couple of trains
  if (crs==="LST" && Math.random() > 0.3) return [];
  const now=new Date(); const trains=[]; let offset=Math.floor(Math.random()*8);
  const count = crs==="LST" ? 1+Math.floor(Math.random()*2) : 14;
  for(let i=0;i<count;i++){
    offset+=12+Math.floor(Math.random()*20);
    const depDate=addMins(now,offset);
    const route=routes[Math.floor(Math.random()*routes.length)];
    const r=Math.random();
    let status;
    if(r<0.72) status={type:"ontime",label:"On time",delayMins:0};
    else if(r<0.88){const d=2+Math.floor(Math.random()*14);status={type:"delayed",label:`Exp ${fmtTime(addMins(depDate,d))}`,delayMins:d};}
    else status={type:"cancelled",label:"Cancelled",delayMins:0};
    const stops=route.stops.map(name=>({name,time:fmtTime(addMins(depDate,offsets[name]||0))}));
    const isVia=VIA_STATIONS.some(v=>route.stops.includes(v));
    trains.push({id:`${crs}-${i}`,timeDisplay:fmtTime(depDate),depDate,durationMins:crs==="LST"?95:102,
      destination:"Thorpe Bay",platform:String(Math.floor(Math.random()*12)+1),status,isVia,calling:stops,fromStation:crs});
  }
  return trains;
}

function useNow() {
  const [now,setNow]=useState(new Date());
  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),30000);return()=>clearInterval(t);},[]);
  return now;
}

function Clock() {
  const [t,setT]=useState(new Date());
  useEffect(()=>{const i=setInterval(()=>setT(new Date()),1000);return()=>clearInterval(i);},[]);
  return <span style={{fontFamily:"'Courier New',monospace",fontSize:"0.9rem",color:"#AAA",letterSpacing:"0.08em"}}>
    {fmtTime(t)}:{String(t.getSeconds()).padStart(2,"0")}
  </span>;
}

function getMinsUntil(dep,now){return Math.round((dep-now)/60000);}

function Countdown({mins}) {
  if(mins<=0) return <span style={{color:"#C0392B",fontSize:"0.68rem",fontWeight:700}}>Departing now</span>;
  if(mins===1) return <span style={{color:"#C0392B",fontSize:"0.68rem",fontWeight:600}}>1 min time</span>;
  if(mins<=5)  return <span style={{color:"#C0392B",fontSize:"0.68rem",fontWeight:600}}>{mins} mins time</span>;
  if(mins<=15) return <span style={{color:"#B8860B",fontSize:"0.68rem",fontWeight:500}}>{mins} mins time</span>;
  return <span style={{color:"#AAA",fontSize:"0.68rem"}}>{mins} mins time</span>;
}

function StationBadge({crs}) {
  return <span style={{display:"inline-block",fontSize:"0.6rem",fontWeight:700,letterSpacing:"0.04em",
    background:"#E8E0D5",color:"#888",borderRadius:3,padding:"1px 5px",verticalAlign:"middle",marginLeft:5}}>{crs}</span>;
}

function DurationBar({mins}) {
  const pct=Math.min(100,(mins/110)*100);
  const label=fmtDuration(mins)||"--";
  return <div style={{marginTop:14,marginBottom:6}}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
      <span style={{fontSize:"0.68rem",color:"#AAA",textTransform:"uppercase",letterSpacing:"0.07em"}}>Journey time</span>
      <span style={{fontFamily:"'Courier New',monospace",fontSize:"0.8rem",color:"#555",fontWeight:600}}>{label}</span>
    </div>
    <div style={{height:4,background:"#EDE8E0",borderRadius:2,overflow:"hidden"}}>
      <div style={{height:"100%",width:`${pct}%`,background:"#C8B89A",borderRadius:2}} />
    </div>
  </div>;
}

function TrainRow({train,index,visible,onClick,selected,now}) {
  const mins=getMinsUntil(train.depDate,now);
  const isVia=train.isVia;
  const dur=fmtDuration(train.durationMins);
  return (
    <div onClick={()=>onClick(train)} style={{
      display:"grid",gridTemplateColumns:"1fr auto 56px 16px",gap:"0 10px",alignItems:"center",
      padding:"13px 16px",borderBottom:"1px solid #E8E0D5",cursor:"pointer",
      background:selected?"#F0EAE0":index%2===0?"#FDFAF6":"#F9F5EF",
      opacity:visible?1:0,transform:visible?"translateY(0)":"translateY(10px)",
      transition:`opacity 0.25s ease ${index*45}ms, transform 0.25s ease ${index*45}ms, background 0.15s`,
      borderLeft:isVia?"3px solid #C0392B":"3px solid transparent",
    }}>
      <div>
        <div style={{color:isVia?"#C0392B":"#999",fontSize:"0.78rem",fontWeight:500,marginBottom:2}}>
          {train.destination}
          {isVia&&<span style={{opacity:0.7,fontWeight:400}}> · via Ockendon</span>}
          <StationBadge crs={train.fromStation}/>
        </div>
        <div style={{display:"flex",alignItems:"baseline",gap:8,flexWrap:"wrap"}}>
          <div style={{fontFamily:"'Courier New',monospace",fontSize:"1.5rem",fontWeight:700,
            color:isVia?"#C0392B":"#1A1A1A",lineHeight:1}}>{train.timeDisplay}</div>
          <Countdown mins={mins}/>
        </div>
        {dur&&<div style={{marginTop:3,color:"#BBB",fontSize:"0.66rem"}}>{dur} journey</div>}
      </div>
      <div style={{textAlign:"right"}}>
        <div style={{marginBottom:5}}>
          {train.status.type==="ontime"&&<span style={{color:"#2E7D32",fontSize:"0.68rem",fontWeight:600}}>On time</span>}
          {train.status.type==="delayed"&&<span style={{color:"#B8860B",fontSize:"0.68rem",fontWeight:700,whiteSpace:"nowrap"}}>
            {train.status.label}
            {train.status.delayMins!=null&&train.status.delayMins>0&&
              <span style={{fontWeight:500,opacity:0.85}}> +{train.status.delayMins}m</span>}
          </span>}
          {train.status.type==="cancelled"&&<span style={{color:"#C0392B",fontSize:"0.68rem",fontWeight:700}}>Cancelled</span>}
        </div>
        <div>
          <div style={{color:"#CCC",fontSize:"0.55rem",textTransform:"uppercase",letterSpacing:"0.05em",lineHeight:1,marginBottom:1}}>Plt</div>
          <div style={{fontFamily:"'Courier New',monospace",color:"#222",fontSize:"1.4rem",fontWeight:800,lineHeight:1}}>{train.platform}</div>
        </div>
      </div>
      <div/>
      <div style={{color:"#CCC",fontSize:"0.75rem"}}>›</div>
    </div>
  );
}

function CallingSheet({train,onClose,now}) {
  const mins=getMinsUntil(train.depDate,now);
  return (
    <div style={{position:"fixed",inset:0,background:"#00000040",zIndex:100,
      display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{
        background:"#FDFAF6",width:"100%",maxWidth:540,
        borderRadius:"16px 16px 0 0",padding:"20px 20px 0",
        borderTop:"2px solid #E0D8CC",maxHeight:"82vh",overflowY:"auto",
      }}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
          <div>
            <div style={{color:"#AAA",fontSize:"0.75rem",marginBottom:3}}>
              {train.destination} · {STATIONS[train.fromStation]?.full}
            </div>
            <div style={{fontFamily:"'Courier New',monospace",fontSize:"1.7rem",fontWeight:700,color:"#1A1A1A",lineHeight:1}}>
              {train.timeDisplay}
            </div>
            <div style={{marginTop:5,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <span style={{color:"#AAA",fontSize:"0.75rem"}}>Platform {train.platform}</span>
              <Countdown mins={mins}/>
              {train.status.type!=="ontime"&&(
                <span style={{color:train.status.type==="cancelled"?"#C0392B":"#B8860B",fontSize:"0.72rem",fontWeight:600}}>
                  · {train.status.label}
                  {train.status.delayMins!=null&&train.status.delayMins>0&&
                    <span style={{fontWeight:400,opacity:0.8}}> (+{train.status.delayMins}m)</span>}
                </span>
              )}
            </div>
          </div>
          <button onClick={onClose} style={{background:"#EDE8E0",border:"none",color:"#888",
            borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:"0.82rem",flexShrink:0,marginTop:4}}>
            Close
          </button>
        </div>
        <DurationBar mins={train.durationMins}/>
        <div style={{color:"#CCC",fontSize:"0.65rem",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:6,marginTop:10}}>
          Calling at
        </div>
        <div className="safe-bottom">
          {train.calling.map((stop,i)=>{
            const isFinal=i===train.calling.length-1;
            return <div key={i} style={{display:"grid",gridTemplateColumns:"48px 14px 1fr",gap:"0 10px",
              alignItems:"center",padding:"7px 0",borderBottom:!isFinal?"1px solid #EDE8E0":"none"}}>
              <div style={{fontFamily:"'Courier New',monospace",fontSize:"0.85rem",
                fontWeight:isFinal?700:500,color:isFinal?"#1A1A1A":"#555",textAlign:"right"}}>{stop.time}</div>
              <div style={{display:"flex",justifyContent:"center"}}>
                <div style={{width:isFinal?9:7,height:isFinal?9:7,borderRadius:"50%",
                  background:isFinal?"#1A1A1A":"#D0C8BC",border:isFinal?"none":"1.5px solid #C8BEB0"}}/>
              </div>
              <div style={{fontSize:isFinal?"0.88rem":"0.85rem",color:isFinal?"#1A1A1A":"#555",
                fontWeight:isFinal?700:400,display:"flex",alignItems:"center",gap:6}}>
                {stop.name}
                {isFinal&&<span style={{color:"#CCC",fontSize:"0.6rem",letterSpacing:"0.06em"}}>FINAL</span>}
              </div>
            </div>;
          })}
        </div>
      </div>
    </div>
  );
}

function StationToggle({value,onChange}) {
  const opts=[{key:"both",label:"Both"},{key:"FST",label:"Fenchurch St"},{key:"LST",label:"Liverpool St"}];
  return (
    <div style={{display:"flex",background:"#EDE8E0",borderRadius:12,padding:3,gap:3,height:"100%"}}>
      {opts.map(o=>(
        <button key={o.key} onClick={()=>onChange(o.key)} style={{
          flex:1,border:"none",borderRadius:9,padding:"12px 10px",
          fontSize:"0.82rem",fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",
          background:value===o.key?"#FDFAF6":"transparent",
          color:value===o.key?"#1A1A1A":"#999",
          boxShadow:value===o.key?"0 1px 3px #00000018":"none",
          transition:"all 0.15s",
        }}>{o.label}</button>
      ))}
    </div>
  );
}

function AboutSheet({ onClose }) {
  const features = [
    { icon: "🚆", title: "Live c2c departures", desc: "Real-time trains to Thorpe Bay from Fenchurch Street and Liverpool Street, pulled from National Rail's live data." },
    { icon: "🔀", title: "Station toggle", desc: "Switch between Fenchurch Street, Liverpool Street, or view both stations merged and sorted by time." },
    { icon: "🔴", title: "Route highlighting", desc: "Trains calling at Ockendon, Chafford Hundred, or Grays are marked in red so you can spot them at a glance." },
    { icon: "⏱", title: "Live countdown", desc: "Each departure shows time remaining, e.g. \"12 mins time\", updating automatically." },
    { icon: "⚠️", title: "Delay tracking", desc: "Delayed services show the new expected time plus how many minutes late." },
    { icon: "📍", title: "Full calling points", desc: "Tap any train to see every stop with scheduled times down to Thorpe Bay." },
    { icon: "🕒", title: "Journey duration", desc: "See total journey time from departure to Thorpe Bay at a glance." },
    { icon: "🔄", title: "Auto-refresh", desc: "Board updates automatically every 60 seconds, or refresh manually anytime." },

  return (

      <div onClick={e=>e.stopPropagation()} style={{
        background:"#FDFAF6",width:"100%",maxWidth:540,
        borderRadius:"16px 16px 0 0",padding:"22px 20px 0",
        borderTop:"2px solid #E0D8CC",maxHeight:"85vh",overflowY:"auto",
      }}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}}>
          <div>
            <div style={{fontSize:"1.3rem",fontWeight:700,color:"#1A1A1A",letterSpacing:"-0.01em"}}>
              Thorpe Bay Trains
            </div>
            <div style={{color:"#AAA",fontSize:"0.78rem",marginTop:2}}>About this app</div>
          </div>
          <button onClick={onClose} style={{background:"#EDE8E0",border:"none",color:"#888",
            borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:"0.82rem",flexShrink:0}}>
            Close
          </button>
        </div>

        <div style={{marginBottom:8}}>
          {features.map((f,i)=>(

              borderBottom: i<features.length-1 ? "1px solid #EDE8E0" : "none"}}>
              <div style={{fontSize:"1.3rem",lineHeight:1,flexShrink:0,width:28,textAlign:"center"}}>{f.icon}</div>
              <div>
                <div style={{fontSize:"0.88rem",fontWeight:700,color:"#1A1A1A",marginBottom:2}}>{f.title}</div>
                <div style={{fontSize:"0.78rem",color:"#888",lineHeight:1.5}}>{f.desc}</div>
              </div>
            </div>
          ))}
        </div>

        <div className="safe-bottom" style={{marginTop:16,paddingTop:16,borderTop:"1px solid #EDE8E0",
          textAlign:"center",paddingBottom:24}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            <span style={{color:"#CCC",fontSize:"0.68rem",fontWeight:500}}>Leonard Rex</span>
            <span style={{color:"#DDD",fontSize:"0.68rem"}}>·</span>
            <a href="https://github.com/LeonardRex20/C2c_traintimes" target="_blank" rel="noopener noreferrer"
              style={{color:"#999",fontSize:"0.68rem",fontWeight:500,textDecoration:"underline"}}>
              View source
            </a>
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [filter,setFilter]=useState("both");
  const [fstTrains,setFstTrains]=useState([]);
  const [lstTrains,setLstTrains]=useState([]);
  const [visible,setVisible]=useState(false);
  const [selectedTrain,setSelectedTrain]=useState(null);
  const [loading,setLoading]=useState(false);
  const [apiStatus,setApiStatus]=useState(null);
  const [debugInfo,setDebugInfo]=useState(null);
  const [installPrompt,setInstallPrompt]=useState(null);
  const [showAbout,setShowAbout]=useState(false);
  const now=useNow();

  useEffect(()=>{
    const handler=e=>{e.preventDefault();setInstallPrompt(e);};
    window.addEventListener("beforeinstallprompt",handler);
    return()=>window.removeEventListener("beforeinstallprompt",handler);
  },[]);

  async function fetchStation(crs) {
    const res=await fetch(`${HUXLEY}/departures/${crs}/30?expand=true`);
    if(!res.ok) throw new Error(`HTTP ${res.status} for ${crs}`);
    const data = await res.json();
    const raw = data.trainServices||[];
    const rawCount = raw.length;
    const parsed = parseDarwin(data, crs);
    const c2cCount = parsed.length;
    const sampleOps = [...new Set(raw.slice(0,8).map(s=>s.operator||"?"))].join(", ");
    const sampleDests = [...new Set(raw.slice(0,5).map(s=>s.destination?.[0]?.locationName||"?"))].join(", ");
    return { trains: parsed, rawCount, c2cCount, crs, sampleOps, sampleDests };
  }

  async function load() {
    setVisible(false); setLoading(true); setSelectedTrain(null); setDebugInfo(null);
    try {
      const [fstRes,lstRes]=await Promise.all([fetchStation("FST"),fetchStation("LST")]);
      setFstTrains(fstRes.trains); setLstTrains(lstRes.trains); setApiStatus("live");
      setDebugInfo(
        `FST: ${fstRes.rawCount} svc (${fstRes.c2cCount} match) ops:[${fstRes.sampleOps}] dest:[${fstRes.sampleDests}] · ` +
        `LST: ${lstRes.rawCount} svc (${lstRes.c2cCount} match) ops:[${lstRes.sampleOps}]`
      );
    } catch(err) {
      console.warn("API fallback:",err.message);
      setFstTrains(generateFallback("FST")); setLstTrains(generateFallback("LST")); setApiStatus("demo");
      setDebugInfo(`API error: ${err.message}`);
    } finally { setLoading(false); setVisible(true); }
  }

  useEffect(()=>{load();},[]);
  useEffect(()=>{ const t=setInterval(load,60000); return()=>clearInterval(t); },[]);

  const allTrains=[
    ...(filter!=="LST"?fstTrains:[]),
    ...(filter!=="FST"?lstTrains:[]),
  ].sort((a,b)=>a.depDate-b.depDate);

  return (
    <div style={{minHeight:"100vh",background:"#F5F0E8"}}>
      <div className="safe-header" style={{background:"#FDFAF6",borderBottom:"1px solid #E0D8CC",
        paddingLeft:16,paddingRight:16,paddingBottom:12,position:"sticky",top:0,zIndex:50}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <Clock/>
            <div>
              <div style={{color:"#AAA",fontSize:"0.7rem",letterSpacing:"0.05em",textTransform:"uppercase",marginBottom:1}}>
                To Thorpe Bay
                {apiStatus&&<span style={{marginLeft:8,color:apiStatus==="live"?"#2E7D32":"#B8860B",fontWeight:600}}>
                  · {apiStatus==="live"?"● Live":"○ Demo"}
                </span>}
              </div>
              <div style={{fontSize:"1.1rem",fontWeight:700,color:"#1A1A1A",letterSpacing:"-0.01em",lineHeight:1}}>
                {filter==="FST"?"Fenchurch Street":filter==="LST"?"Liverpool Street":"All departures"}
              </div>
            </div>
          </div>
          <button onClick={()=>setShowAbout(true)} style={{
            background:"#EDE8E0",border:"none",borderRadius:"50%",
            width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center",
            color:"#888",fontSize:"0.95rem",fontWeight:700,fontStyle:"italic",
            fontFamily:"Georgia, serif",cursor:"pointer",flexShrink:0,
          }}>i</button>
        </div>
      </div>

      {loading&&(
        <div style={{padding:"48px 20px",textAlign:"center"}}>
          <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:14}}>
            {[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:"#C8B89A",
              animation:`pulse 0.9s ease-in-out ${i*0.2}s infinite alternate`}}/>)}
          </div>
          <div style={{color:"#CCC",fontSize:"0.82rem"}}>Loading live departures…</div>
        </div>
      )}

      {!loading&&allTrains.length===0&&(
        <div style={{padding:"56px 24px",textAlign:"center"}}>
          <div style={{fontSize:"2.2rem",marginBottom:14}}>🚉</div>
          <div style={{color:"#999",fontSize:"0.9rem",fontWeight:600,marginBottom:6}}>
            No c2c departures to Thorpe Bay
          </div>
          <div style={{color:"#BBB",fontSize:"0.78rem",lineHeight:1.5,marginBottom:14}}>
            {filter==="LST" ? "c2c only runs from here occasionally." : filter==="FST" ? "Check back shortly." : "Try checking again in a few minutes."}
          </div>
          {debugInfo && apiStatus === "demo" && (
            <div style={{display:"inline-block",maxWidth:"100%",background:"#F0EAE0",borderRadius:8,padding:"10px 14px",
              color:"#AA9",fontSize:"0.65rem",fontFamily:"'Courier New',monospace",textAlign:"left",lineHeight:1.5,wordBreak:"break-word"}}>
              {debugInfo}
            </div>
          )}
        </div>
      )}

      {!loading&&allTrains.length>0&&(<>
        <div style={{display:"grid",gridTemplateColumns:"1fr auto 56px 16px",gap:"0 10px",
          padding:"5px 16px",borderBottom:"1px solid #E0D8CC",background:"#F5F0E8"}}>
          {[["Departure","left"],["Status / Plt","right"],["",""],["",""]].map(([h,a],i)=>(
            <div key={i} style={{color:"#CCC",fontSize:"0.62rem",textTransform:"uppercase",letterSpacing:"0.08em",textAlign:a}}>{h}</div>
          ))}
        </div>
        {allTrains.map((train,i)=>(
          <TrainRow key={train.id} train={train} index={i} visible={visible}
            onClick={()=>setSelectedTrain(train)} selected={selectedTrain?.id===train.id} now={now}/>
        ))}
        <div style={{padding:"12px 16px",display:"flex",alignItems:"center",gap:6}}>
          <div style={{width:10,height:3,background:"#C0392B",borderRadius:2,flexShrink:0}}/>
          <span style={{color:"#C0392B",fontSize:"0.66rem"}}>via Ockendon, Chafford Hundred or Grays</span>
        </div>
      </>)}

      {/* Spacer so content isn't hidden behind fixed bottom bar */}
      <div style={{height:installPrompt?168:118}} />

      {selectedTrain&&<CallingSheet train={selectedTrain} onClose={()=>setSelectedTrain(null)} now={now}/>}
      {showAbout&&<AboutSheet onClose={()=>setShowAbout(false)}/>}

      {/* Fixed bottom controls */}
      <div className="safe-bottom" style={{position:"fixed",left:0,right:0,bottom:0,background:"#FDFAF6",
        borderTop:"1px solid #E0D8CC",padding:"12px 16px",zIndex:50,boxShadow:"0 -4px 16px #00000010"}}>
        <div style={{display:"flex",gap:10,alignItems:"stretch"}}>
          <div style={{flex:1}}>
            <StationToggle value={filter} onChange={v=>{setFilter(v);setSelectedTrain(null);}}/>
          </div>
          <button onClick={load} style={{background:"#1A1A1A",border:"none",borderRadius:12,
            color:"#F5F0E8",padding:"0 22px",cursor:"pointer",fontSize:"1.7rem",lineHeight:1,
            minWidth:64,display:"flex",alignItems:"center",justifyContent:"center"}}>↻</button>
        </div>
        {installPrompt&&(
          <button onClick={async()=>{installPrompt.prompt();const r=await installPrompt.userChoice;if(r.outcome==="accepted")setInstallPrompt(null);}}
            style={{marginTop:10,width:"100%",background:"#EDE8E0",border:"none",borderRadius:10,
              color:"#555",padding:"12px",fontSize:"0.85rem",fontWeight:600,cursor:"pointer"}}>
            📲 Add to Home Screen
          </button>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
if ("serviceWorker" in navigator) {
  const swCode = `
    const CACHE = "thorpe-bay-v1";
    self.addEventListener("install", e => { self.skipWaiting(); });
    self.addEventListener("activate", e => {
      e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))).then(()=>self.clients.claim()));
    });
    self.addEventListener("fetch", e => {
      if (e.request.url.includes("huxley2")) {
        e.respondWith(fetch(e.request).catch(()=>new Response(JSON.stringify({trainServices:[]}),{headers:{"Content-Type":"application/json"}})));
      } else {
        e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).then(res=>{
          const clone=res.clone();
          caches.open(CACHE).then(c=>c.put(e.request,clone));
          return res;
        }).catch(()=>r)));
      }
    });
  `;
  const blob = new Blob([swCode], {type:"application/javascript"});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
</body>
</html>
